services:
  backend:
    build:
      context: ../../apps/backend/
      dockerfile: Dockerfile
    container_name: gamedock-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ../../apps/frontend/
      dockerfile: Dockerfile
    container_name: gamedock-frontend
    ports:
      - "3400:3400"
    environment:
      - NODE_ENV=production

  discord:
    build: 
      context: ../../apps/discord-bot/
      dockerfile: Dockerfile
    container_name: gamedock-discord
    environment:
      - NODE_ENV=production
    env_file:
      - .env.discord

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports: 
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

  